<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 120" width="580" height="120">
  <defs>
    <radialGradient id="hGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="hAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="hShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ===== ICON (100x100) ===== -->
  <g transform="translate(10, 10)">
    <circle cx="50" cy="50" r="42" fill="url(#hGlow)"/>

    <polygon points="50,18 95,44 95,78 50,104 5,78 5,44" 
             fill="url(#hBody)" filter="url(#hShadow)" stroke="#4f46e5" stroke-width="1.5"/>

    <polygon points="50,28 85,49 85,73 50,94 15,73 15,49" 
             fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.35"/>

    <!-- Nodes -->
    <circle cx="28" cy="48" r="8" fill="#1e1b4b" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="28" cy="48" r="3" fill="#22d3ee"/>

    <circle cx="50" cy="35" r="8" fill="#1e1b4b" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="50" cy="35" r="3" fill="#22d3ee"/>

    <circle cx="72" cy="48" r="8" fill="#1e1b4b" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="72" cy="48" r="3" fill="#22d3ee"/>

    <circle cx="28" cy="74" r="8" fill="#1e1b4b" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="28" cy="74" r="3" fill="#22d3ee"/>

    <circle cx="72" cy="74" r="8" fill="#1e1b4b" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="72" cy="74" r="3" fill="#22d3ee"/>

    <!-- Lines -->
    <line x1="28" y1="48" x2="50" y2="35" stroke="url(#hAccent)" stroke-width="2" stroke-linecap="round"/>
    <line x1="50" y1="35" x2="72" y2="48" stroke="url(#hAccent)" stroke-width="2" stroke-linecap="round"/>
    <line x1="28" y1="48" x2="28" y2="74" stroke="url(#hAccent)" stroke-width="2" stroke-linecap="round"/>
    <line x1="72" y1="48" x2="72" y2="74" stroke="url(#hAccent)" stroke-width="2" stroke-linecap="round"/>

    <line x1="28" y1="61" x2="72" y2="61" stroke="#22d3ee" stroke-width="1" opacity="0.25" stroke-linecap="round"/>

    <circle cx="50" cy="85" r="6" fill="#1e1b4b" stroke="#fbbf24" stroke-width="1.5"/>
    <circle cx="50" cy="85" r="2.5" fill="#fbbf24"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <text x="130" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="800" fill="#e2e8f0" letter-spacing="-0.5">Nexus</text>
  <text x="130" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="300" fill="#94a3b8" letter-spacing="2">Forge</text>

  <!-- Accent line -->
  <rect x="130" y="100" width="78" height="2.5" rx="1.25" fill="#6366f1" opacity="0.7"/>
</svg>